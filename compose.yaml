services:
  neo4j:
    build:
      context: .
    image: neo4j-conf:local
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/password}"
      ENABLE_OPENGDS: "${ENABLE_OPENGDS:-true}"
      OPENGDS_VERSION: "${OPENGDS_VERSION:-2.12.0}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE_SIZE:-512M}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL_SIZE:-512M}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX_SIZE:-512M}"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
